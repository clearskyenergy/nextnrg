<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects — NextNRG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cs-navy:#08384F;--cs-dark:#052A3D;--cs-blue:#006F9A;--cs-sky:#00A9A4;--cs-accent:#00A9A4;--cs-gold:#00C4BC;--cs-text:#0F2733;--cs-sub:#5A7180;--cs-bg:#F4F1EC;--cs-surface:#FAFAF8;--cs-border:#DDD8D0;--cs-red:#E53935}
body{font-family:'DM Sans',sans-serif;background:var(--cs-bg);color:var(--cs-text);min-height:100vh}
#topbar{display:flex;align-items:center;gap:0;background:var(--cs-navy);color:#fff;padding:0 24px;height:60px;position:sticky;top:0;z-index:200}
.tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.tb-omega{height:30px;width:auto}
.tb-logo-txt{font-size:18px;font-weight:700;letter-spacing:-.3px}
.tb-logo-txt span{color:var(--cs-gold)}
.tb-sep{width:1px;height:26px;background:rgba(255,255,255,.18);margin:0 16px}
.tb-portal{font-size:12px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.55);text-transform:uppercase}
.tb-client{display:flex;align-items:center;gap:10px;margin-left:16px}
.tb-client-chip{width:34px;height:34px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--cs-navy);font-weight:700;font-size:14px}
.tb-client-chip img{max-width:100%;max-height:100%}
.tb-ent-badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--cs-gold);background:rgba(0,196,188,.14);border:1px solid rgba(0,196,188,.4);border-radius:20px;padding:4px 11px}
.tb-nav{display:flex;align-items:center;gap:4px;margin-left:22px}
.tb-tab{display:flex;align-items:center;gap:7px;text-decoration:none;background:transparent;border:1px solid transparent;color:rgba(255,255,255,.62);border-radius:8px;padding:8px 14px;cursor:pointer;font:600 13px/1 'DM Sans',sans-serif;white-space:nowrap;transition:all .12s}
.tb-tab svg{width:15px;height:15px;flex:none}
.tb-tab:hover{color:#fff;background:rgba(255,255,255,.07)}
.tb-tab.active{color:#fff;background:rgba(0,169,164,.18);border-color:rgba(0,169,164,.45)}
.tb-spacer{flex:1}
.tb-user{display:flex;align-items:center;gap:10px}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--cs-sky);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.tb-name{font-size:13px;color:rgba(255,255,255,.9)}
.btn-signout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:7px 14px;font:600 12px 'DM Sans',sans-serif;cursor:pointer;transition:all .12s}
.btn-signout:hover{background:rgba(255,255,255,.16)}
#main{max-width:1000px;margin:0 auto;padding:40px 24px}
.page-title{font-size:28px;font-weight:700;color:var(--cs-navy);letter-spacing:-.3px}
.page-sub{font-size:14px;color:var(--cs-sub);margin-top:4px}
.toolbar{display:flex;gap:10px;margin:24px 0;align-items:center}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;border:1.5px solid var(--cs-border);border-radius:9px;padding:9px 12px 9px 36px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--cs-text);outline:none}
.search-wrap input:focus{border-color:var(--cs-sky)}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%)}
select.sort-sel{border:1.5px solid var(--cs-border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--cs-text);outline:none;cursor:pointer}
.proj-table{background:#fff;border:1px solid var(--cs-border);border-radius:12px;overflow:hidden}
.pt-head{display:grid;grid-template-columns:1fr 160px 100px 90px 60px;padding:12px 16px;border-bottom:1px solid var(--cs-border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--cs-sub)}
.pt-row{display:grid;grid-template-columns:1fr 160px 100px 90px 60px;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.04);align-items:center;cursor:pointer;transition:background .1s}
.pt-row:hover{background:#F8F9FA}
.pt-row:last-child{border-bottom:none}
.pt-name{font-size:14px;font-weight:600;color:var(--cs-navy)}
.pt-addr{font-size:11px;color:var(--cs-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-type{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(27,79,138,.1);color:var(--cs-blue);display:inline-block}
.pt-date{font-size:12px;color:var(--cs-sub)}
.pt-del{background:none;border:none;cursor:pointer;color:var(--cs-border);font-size:16px;padding:4px}
.pt-del:hover{color:var(--cs-red)}
.empty{text-align:center;padding:60px;color:var(--cs-sub)}
.empty svg{opacity:.3;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--cs-sub)}
.spin{width:18px;height:18px;border:2px solid var(--cs-border);border-top-color:var(--cs-sky);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.pt-head,.pt-row{grid-template-columns:1fr 80px 50px}}
</style>
</head>
<body>
<div id="topbar">
  <a href="/" class="tb-logo">
    <img src="/clearsky-omega-mark-white.png" alt="OMEGA" class="tb-omega" onerror="this.style.display='none'">
    <span class="tb-logo-txt">Clear<span>Sky</span> OMEGA</span>
  </a>
  <div class="tb-sep"></div>
  <span class="tb-portal">EnergyOS</span>
  <div class="tb-client">
    <span class="tb-client-chip" id="tb-client-chip"></span>
    <span class="tb-ent-badge" id="tb-ent-badge">Account</span>
  </div>
  <div class="tb-nav">
    <a class="tb-tab" href="/" id="tab-portal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Portal
    </a>
    <a class="tb-tab" href="/marketplace.html" id="tab-marketplace">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1-5h16l1 5"/><path d="M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M9 22V12h6v10"/></svg>
      Marketplace
    </a>
    <a class="tb-tab active" href="/projects.html" id="tab-projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Projects
    </a>
  </div>
  <div class="tb-spacer"></div>
  <div class="tb-user">
    <div class="tb-avatar" id="tb-avatar">–</div>
    <span class="tb-name" id="tb-name"></span>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div id="main">
  <div class="page-title">Projects</div>
  <div class="page-sub" id="proj-sub">Loading…</div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" placeholder="Search projects…" oninput="filterProjects()">
    </div>
    <select class="sort-sel" id="sort" onchange="renderTable()">
      <option value="updated">Recently Updated</option>
      <option value="created">Date Created</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>

  <div class="proj-table" id="proj-table">
    <div class="loading"><div class="spin"></div> Loading projects…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/config.js"></script>
<script>
const CFG = window.CLEARSKY_CONFIG;
firebase.initializeApp(CFG.firebase);
const auth = firebase.auth();
const db = firebase.firestore();
let allProjects = [];

// Workspace resolution — matches the marketplace/portal so the client chip,
// tier badge, avatar and name render identically across pages.
const WORKSPACES = window.OMEGA_WORKSPACES || {};
const WS = window.OMEGA_WORKSPACE ||
  WORKSPACES['nextnrg.com'] ||
  { orgId:'nextnrg.com', allowedDomain:'nextnrg.com', clientName:'NextNRG', accountTier:'Enterprise', logo:'/nextnrg-logo.png' };
function domainOf(email){ return (email||'').split('@')[1] || ''; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function signOut(){ auth.signOut().then(function(){ window.location.href='/'; }); }

function paintTopbar(user){
  var chip = document.getElementById('tb-client-chip');
  if (chip){ chip.innerHTML = WS.logo
      ? '<img src="'+esc(WS.logo)+'" alt="" onerror="this.style.display=\'none\';this.parentNode.textContent=\''+esc((WS.clientName||'?').charAt(0))+'\'">'
      : esc((WS.clientName||'?').charAt(0)); }
  var badge = document.getElementById('tb-ent-badge');
  if (badge) badge.textContent = (WS.accountTier||'Account') + ' Account';
  var nm = document.getElementById('tb-name'); if (nm) nm.textContent = user.email || '';
  var av = document.getElementById('tb-avatar'); if (av) av.textContent = (user.email||'?').charAt(0).toUpperCase();
}

auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = '/'; return; }
  paintTopbar(user);
  // Only @<allowedDomain> accounts may view this workspace's projects.
  if (WS.allowedDomain && domainOf(user.email) !== WS.allowedDomain) {
    document.getElementById('proj-table').innerHTML =
      '<div class="empty"><p>This is the ' + esc(WS.clientName||'NextNRG') + ' workspace. Sign in with your @' +
      esc(WS.allowedDomain) + ' account to view projects.</p></div>';
    document.getElementById('proj-sub').textContent = 'Access restricted to @' + WS.allowedDomain;
    return;
  }
  loadProjects();
});

async function loadProjects() {
  try {
    // Scope by orgId → matches Firestore security rules and the dashboard.
    const snap = await db.collection('projects').where('orgId','==',WS.orgId).get();
    allProjects = snap.docs.map(d => ({id:d.id,...d.data()}));
    // Sort newest-first client-side (avoids needing a composite index).
    allProjects.sort((a,b)=>{
      const ta = a.updatedAt?.toDate?.()?.getTime() || 0;
      const tb = b.updatedAt?.toDate?.()?.getTime() || 0;
      return tb - ta;
    });
    document.getElementById('proj-sub').textContent = allProjects.length + ' project(s) total';
    renderTable();
  } catch(e) {
    document.getElementById('proj-table').innerHTML = `<div class="empty"><p>Error: ${e.message}</p></div>`;
  }
}

function filterProjects() {
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  let filtered = allProjects.filter(p => !q || (p.name||'').toLowerCase().includes(q) || (p.address||'').toLowerCase().includes(q));

  if (sort === 'name') filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if (sort === 'created') filtered.sort((a,b)=>{
    const ta = a.createdAt?.toDate?.()?.getTime()|| 0;
    const tb = b.createdAt?.toDate?.()?.getTime()|| 0;
    return tb - ta;
  });

  const table = document.getElementById('proj-table');
  if (!filtered.length) {
    table.innerHTML = `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>No projects found.</p></div>`;
    return;
  }

  table.innerHTML = `
    <div class="pt-head"><span>Project</span><span>Address</span><span>Type</span><span>Updated</span><span></span></div>
    ${filtered.map(p => {
      const date = p.updatedAt?.toDate ? p.updatedAt.toDate().toLocaleDateString() : '—';
      return `<div class="pt-row" onclick="openProject('${p.id}')">
        <div><div class="pt-name">${esc(p.name||'Untitled')}</div><div class="pt-addr">${esc(p.address||'—')}</div></div>
        <div class="pt-addr" style="padding-right:8px">${esc(p.address||'—')}</div>
        <div><span class="pt-type">${esc(p.type||'BESS')}</span></div>
        <div class="pt-date">${date}</div>
        <div><button class="pt-del" onclick="event.stopPropagation();deleteProject('${p.id}','${esc(p.name||'Untitled')}')">🗑</button></div>
      </div>`;
    }).join('')}`;
}

function openProject(id) { window.location.href = '/editor.html?id='+id; }

async function deleteProject(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await db.collection('projects').doc(id).delete();
    allProjects = allProjects.filter(p => p.id !== id);
    renderTable();
  } catch (err) {
    console.error('Delete failed:', err);
    var code = (err && err.code) ? err.code : '';
    if (code === 'permission-denied') {
      alert('Delete blocked by Firestore security rules.\n\nThis usually means the project is missing an "orgId" field (older projects) or its orgId does not match your account. Open + re-save the project to stamp orgId, or update the delete rule.\n\nTechnical: ' + err.message);
    } else {
      alert('Could not delete "' + name + '".\n\n' + (err && err.message ? err.message : err));
    }
  }
}

function openProject(id) { window.location.href = '/editor.html?id='+id; }</script>
</body>
</html>
